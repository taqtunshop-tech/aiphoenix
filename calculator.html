<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=calculator-app/index.html">
  <title>Калькулятор теплообменников — AIPhoenix</title>
  <style>
    body {
      background: #f9f7f3;
      font-family: 'Caveat', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .loader {
      text-align: center;
      font-size: 1.5rem;
      color: #636e72;
    }
    .loader::after {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #d63031;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    Загрузка калькулятора...
    <br><small>Если не перенаправляет — <a href="calculator-app/index.html">нажмите сюда</a></small>
  </div>
</body>
</html>
